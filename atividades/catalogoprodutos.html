<!DOCTYPE html>
<html lang="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Produtos</title>

    <style>
        
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            font-size: 14px;
        }

        h1{
            color:rgb(0, 0, 0);     
        }

        img{
            width: 90px;
            height: 90px;
        }

        table{
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            padding: 10px;
        }

        th{
            background-color: rgb(255, 0, 0);
            color: white;
            padding: 10px;
        }

        tr{
            font-style: oblique;
            padding: 10px;
        }

        a{
            text-decoration: none;
            color: rgb(255, 0, 0);
            font-weight: bold;
        }


    </style>
</head>
<body>

    <h1>Pães</h1>

   <style>
    
    body{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        font-size: 14px;
        background-color: #fff8dc;
    }

    h1{
        color: #8b5e00;
    }

    img{
        width: 90px;
        height: 90px;
        border-radius: 10px;
    }

    table{
        margin: 20px auto;
        border-collapse: collapse;
        width: 80%;
        background-color: white;
    }

    th{
        background-color: #fbc02d;
        color: #5d4037;
        padding: 10px;
    }

    td{
        padding: 10px;
    }

    tr:nth-child(even){
        background-color: #fff9c4;
    }

    a{
        text-decoration: none;
        color: #e65100;
        font-weight: bold;
    }

    a:hover{
        color: #ff8f00;
    }

</style>

<body>

<h1>Tabela de Pães</h1>

<table border="1">
    <tr>
        <th>Imagem</th>
        <th>Nome</th>
        <th>Preço</th>
        <th>Descrição</th>
    </tr>

    <tr>
        <td>
            <img src="../assets/pao1.jpg" alt="Pão de Mel">
        </td>
        <td>Pão de Mel</td>
        <td>R$ 6,50</td>
        <td>Doce recheado e coberto com chocolate.</td>
    </tr>

    <tr>
        <td>
            <img src="../assets/pao3.webp" alt="Pão de Queijo">
        </td>
        <td>Pão de Queijo</td>
        <td>R$ 2,50</td>
        <td>Tradicional pão de queijo mineiro.</td>
    </tr>

    <tr>
        <td>
            <img src="../assets/pao2.webp" alt="Pão Francês">
        </td>
        <td>Pão Francês</td>
        <td>R$ 1,00</td>
        <td>Crocante por fora e macio por dentro.</td>
    </tr>

</table>

</body>

    
</body>
</html>
