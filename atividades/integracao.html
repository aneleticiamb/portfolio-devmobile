<!DOCTYPE html>
<html lang="en">
<head>

    <title>Integração</title>
    <style>
    body{
        background-color: #fff8dc;
        font-family: Arial, sans-serif;
    }

    .container {
        width: 400px;
        margin: 40px auto;
        background-color: #ffe082;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
    }

    h2 {

    }

    }

    input,

        border: 1px solid #fbc02d;

        background-color: #fffde7;
    }

    }

    }

    }

    .sucesso {

    }

    button {
        margin-top: 15px;

        background-color: #fbc02d;
        color: #5d4037;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {

    }
</style>
</head>
